<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crunchyroll - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login">
    <div class="container">
        <img src="Imagens/logo.png" alt="Crunchyroll">
        
        <h2>Criar uma conta</h2>
        <p class="subtitle">Insira seu e-mail para se cadastrar neste aplicativo</p>

        <input type="email" placeholder="email@dominio.com">
        <input type="password" placeholder="Senha">

        <button class="bnt-primary">Entrar</button>

        <div class="divider">ou</div>

        <button class="google">Continuar com o Google
            <img src="Imagens/Logo-Google-G.png" alt="google" class="icon">
        </button>

        <button class="apple">Continuar com a Apple
            <img src="Imagens/apple-logo.png" alt="">
        </button>

        <p class="terms">
            Ao clicar em continuar, você concorda com os 
            <span>Termos de Serviços</span> e com a <span>Política de Privacidade</span>
        </p>
    </div>
</body>
</html>
